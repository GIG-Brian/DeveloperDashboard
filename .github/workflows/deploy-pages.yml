name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './package.json'

      - name: Install dependencies
        run: npm install

      - name: Build webpack bundle
        run: npm run build

      # Assemble the files that GitHub Pages needs to serve.
      # Azure DevOps will load dashboard.html from the Pages URL,
      # then the browser fetches dashboard.css and dist/dashboard.js
      # relative to it — so all three must be at the Pages root.
      - name: Assemble Pages output
        run: |
          mkdir -p _site/dist
          cp dashboard.html _site/
          cp dashboard.css  _site/
          cp dist/dashboard.js _site/dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
